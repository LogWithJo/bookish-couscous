<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Order System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/all.min.css" />
    <style>
      body {
        font-family: "Quicksand", sans-serif;
      }
      html {
        scroll-behavior: smooth;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-orange-600 text-white shadow-lg sticky top-0 z-50">
      <div class="container mx-auto px-4 py-4">
        <div class="flex justify-between items-center">
          <div class="flex items-center gap-3">
            <i class="fas fa-utensils text-3xl"></i>
            <h1 class="text-2xl md:text-3xl font-bold">
              Tasty Bites Restaurant
            </h1>
          </div>
          <div class="flex items-center gap-4">
            <button
              class="relative bg-orange-700 hover:bg-orange-800 px-4 py-2 rounded-full transition"
            >
              <i class="fas fa-shopping-cart mr-2"></i>Cart
              <span
                id="CartNo"
                class="absolute -top-2 -right-2 bg-red-500 text-white text-xs w-6 h-6 rounded-full flex items-center justify-center"
                >0</span
              >
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Menu Section -->
        <div class="lg:col-span-2">
          <h2 class="text-3xl font-bold text-gray-800 mb-6 flex items-center">
            <i class="fas fa-book-open mr-3 text-orange-600"></i>Our Menu
          </h2>

          <!-- Menu Grid -->
          <div
            class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4"
            id="menu-grid"
          >
            <!-- Menu items will be rendered by JavaScript -->
          </div>
        </div>

        <!-- Cart Section -->
        <div class="lg:col-span-1">
          <div
            class="bg-white rounded-2xl shadow-xl sticky top-24 overflow-hidden"
          >
            <!-- Cart Header -->
            <div class="bg-orange-600 text-white p-4">
              <h3 class="text-xl font-bold flex items-center">
                <i class="fas fa-shopping-basket mr-2"></i>Your Order
              </h3>
            </div>

            <!-- Cart Items -->
            <div class="p-4 max-h-80 overflow-y-auto" id="Items">
              <p class="text-gray-500 text-center py-8">Your cart is empty</p>
            </div>

            <!-- Totals Section -->
            <div class="border-t p-4 bg-gray-50">
              <!-- Tax Toggle -->
              <div class="mb-4">
                <label class="flex items-center cursor-pointer">
                  <input
                    type="checkbox"
                    id="YesTax"
                    class="sr-only peer"
                    onchange="ShowTax(this.checked)"
                  />
                  <div
                    class="w-11 h-6 bg-gray-300 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-orange-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-orange-600 relative"
                  ></div>
                  <span class="ml-3 text-gray-700 font-medium">Add Tax</span>
                </label>

                <!-- Tax Input -->
                <div id="TaxInputContainer" class="hidden mt-3">
                  <label class="block text-sm font-medium text-gray-700 mb-1"
                    >Tax Rate (%)</label
                  >
                  <input
                    type="number"
                    id="TaxValueWritten"
                    value="12"
                    min="0"
                    max="100"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                    oninput="CalculateTotal()"
                  />
                  <p id="TaxErrorMessage" class="text-red-500 text-xs mt-1"></p>
                </div>
              </div>

              <!-- Totals -->
              <div class="space-y-2">
                <div class="flex justify-between text-gray-600">
                  <span>Subtotal:</span>
                  <span class="font-semibold"
                    >$<span id="TotalNoTax">0</span></span
                  >
                </div>
                <div
                  id="TaxDisplay"
                  class="hidden flex justify-between text-gray-600"
                >
                  <span>Tax (<span id="Tax">0</span>%):</span>
                  <span class="font-semibold"
                    >$<span id="TotalWithTax">0</span></span
                  >
                </div>
                <div
                  class="flex justify-between text-xl font-bold text-orange-600 pt-2 border-t"
                >
                  <span>Total:</span>
                  <span>$<span id="Total">0</span></span>
                </div>
              </div>

              <!-- Checkout Button -->
              <button
                onclick="processOrder()"
                class="w-full mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition transform hover:scale-105 flex items-center justify-center"
              >
                <i class="fas fa-check-circle mr-2"></i>Process Order
              </button>

              <!-- Clear Cart -->
              <button
                onclick="clearCart()"
                class="w-full mt-2 bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg transition flex items-center justify-center"
              >
                <i class="fas fa-trash mr-2"></i>Clear Cart
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8 mt-12">
      <div class="container mx-auto px-4 text-center">
        <p class="text-lg">
          Thank you for choosing
          <span class="text-orange-500 font-bold">Tasty Bites</span>!
        </p>
        <p class="text-gray-400 mt-2">&copy; 2024 All rights reserved.</p>
      </div>
    </footer>

    <script src="main.js"></script>
    <script>
      // Menu item data with images
      const menuItems = [
        { name: "Burger", price: 50, image: "images/burger1.jpeg" },
        { name: "Fries", price: 15, image: "images/fries.jpeg" },
        { name: "Cheese", price: 20, image: "images/cheese.jpeg" },
        { name: "Tea", price: 12, image: "images/Tea.jpeg" },
        { name: "Juice", price: 25, image: "images/Juice.jpeg" },
        { name: "Pizza", price: 80, image: "images/Pizza.jpeg" },
        { name: "Salad", price: 30, image: "images/Salad.jpeg" },
        { name: "Hot Dog", price: 25, image: "images/Hot Dog.jpeg" },
        {
          name: "Chicken Wings",
          price: 35,
          image: "images/Chicken Wings.jpeg",
        },
        { name: "Soda", price: 10, image: "images/Soda.jpeg" },
        { name: "Coffee", price: 15, image: "images/Coffee.jpeg" },
        { name: "Pasta", price: 45, image: "images/Pasta.jpeg" },
      ];

      // Render menu items
      function renderMenu() {
        const menuGrid = document.getElementById("menu-grid");
        menuGrid.innerHTML = menuItems
          .map(
            (item, index) => `
                <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition group">
                    <div class="relative">
                        <img src="${item.image}" alt="${item.name}" class="w-full h-32 object-cover group-hover:scale-110 transition duration-300" onerror="this.src='https://via.placeholder.com/200x128?text=${item.name}'">
                        <button onclick="Heart(${index})" id="Heart${index}" class="absolute top-2 right-2 text-white hover:text-red-500 transition">
                            <i class="fas fa-heart text-xl"></i>
                        </button>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-gray-800 text-lg">${item.name}</h3>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-orange-600 font-bold text-xl">$${item.price}</span>
                            <div class="flex items-center gap-2">
                                <button onclick="RemoveItems('${item.name}')" class="w-8 h-8 bg-red-500 hover:bg-red-600 text-white rounded-full transition">
                                    <i class="fas fa-minus"></i>
                                </button>
                                <span id="${item.name}" class="w-8 text-center font-bold">0</span>
                                <button onclick="AdItems('${item.name}')" class="w-8 h-8 bg-orange-600 hover:bg-orange-700 text-white rounded-full transition">
                                    <i class="fas fa-plus"></i>
                                </button>
                            </div>
                        </div>
                        <button onclick="AdItems('${item.name}')" class="w-full mt-3 bg-orange-600 hover:bg-orange-700 text-white py-2 rounded-lg transition">
                            <i class="fas fa-cart-plus mr-2"></i>Add to Cart
                        </button>
                    </div>
                </div>
            `,
          )
          .join("");
      }

      // Process order
      function processOrder() {
        if (Orders.length === 0) {
          alert("Your cart is empty! Please add some items.");
          return;
        }

        const total = document.getElementById("Total").innerHTML;
        alert(
          `Order processed successfully!\n\nTotal: $${total}\n\nThank you for your order!`,
        );
      }

      // Clear cart
      function clearCart() {
        if (Orders.length === 0) {
          alert("Your cart is already empty!");
          return;
        }

        if (confirm("Are you sure you want to clear your cart?")) {
          Orders.length = 0;
          for (let i = 0; i < Stock.length; i++) {
            Stock[i][3] = 0;
          }
          document.getElementById("Items").innerHTML =
            '<p class="text-gray-500 text-center py-8">Your cart is empty</p>';
          CartItems();
          CalculateTotal();
        }
      }

      // Initialize
      renderMenu();
    </script>
  </body>
</html>
